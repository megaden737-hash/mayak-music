<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Workspace — Битстор и готовые треки | Mayak Music</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    body { font-family: 'Inter', system_ui, sans-serif; }
    .nav-link:hover { color: #3B82F6; }
    .beat-card { transition: all 0.2s cubic-bezier(.4,0,.2,1); }
    .beat-card:hover { transform: translateY(-4px); }
    .genre-pill { transition: all .1s; }
    .genre-pill.active { background:#3B82F6; color:white; border-color:#3B82F6; }
  </style>
</head>
<body class="bg-[#0B0F1C] text-white">
  <nav class="fixed top-0 left-0 right-0 z-50 bg-[#0B0F1C]/95 border-b border-white/10">
    <div class="max-w-7xl mx-auto px-6 h-20 flex items-center justify-between">
      <a href="index.html" class="flex items-center gap-x-3">
        <div class="w-9 h-9 bg-white rounded-xl flex items-center justify-center"><span class="font-bold text-[#0B0F1C] text-xl">M</span></div>
        <div class="font-semibold tracking-tighter text-[22px]">MAYAK <span class="text-white/40 text-sm">WORKSPACE</span></div>
      </a>
      <div class="hidden md:flex gap-x-8 text-sm font-medium">
        <a href="index.html" class="nav-link text-white/80">Главная</a>
        <a href="places.html" class="nav-link text-white/80">Площадки</a>
        <a href="workspace.html" class="nav-link text-[#3B82F6]">Workspace</a>
        <a href="school.html" class="nav-link text-white/80">Школа</a>
        <a href="label.html" class="nav-link text-white/80">Лейбл</a>
        <a href="merch.html" class="nav-link text-white/80">Мерч</a>
      </div>
      <button onclick="showRequestModal()" class="px-5 py-2.5 rounded-2xl bg-[#3B82F6] text-sm font-semibold">Связаться</button>
    </div>
  </nav>

  <div class="pt-20">
    <div class="max-w-7xl mx-auto px-6 pt-8 pb-10">
      <h1 class="text-6xl tracking-[-2.5px] font-semibold">Биты и треки.<br>Готовые к использованию.</h1>
      <p class="text-lg text-white/70 mt-2 max-w-md">240+ битов и 85 готовых песен. Чистые права. Покупай и используй.</p>
      
      <div class="mt-6 flex gap-3">
        <button onclick="document.getElementById('beats-section').scrollIntoView({behavior:'smooth'})" class="bg-[#FACC15] text-[#0B0F1C] px-9 py-3 font-semibold rounded-2xl">Смотреть биты</button>
        <button onclick="document.getElementById('tracks-section').scrollIntoView({behavior:'smooth'})" class="border border-white/30 px-9 py-3 rounded-2xl">Готовые песни</button>
      </div>
    </div>

    <!-- BEATS -->
    <div id="beats-section" class="max-w-7xl mx-auto px-6">
      <div class="flex justify-between items-center mb-5">
        <div class="font-semibold text-2xl">Битстор</div>
        <button onclick="showRequestModal('Заказать кастомный бит')" class="text-sm px-5 py-2 border border-white/30 rounded-2xl">Заказать под ключ</button>
      </div>

      <div class="flex flex-wrap gap-2 mb-6" id="genre-filters">
        <button onclick="filterBeats('all')" class="genre-pill active px-5 py-1 text-sm rounded-full border border-white/20 bg-white/5" data-genre="all">Все</button>
        <button onclick="filterBeats('hiphop')" class="genre-pill px-5 py-1 text-sm rounded-full border border-white/20" data-genre="hiphop">Hip-Hop</button>
        <button onclick="filterBeats('trap')" class="genre-pill px-5 py-1 text-sm rounded-full border border-white/20" data-genre="trap">Trap</button>
        <button onclick="filterBeats('electronic')" class="genre-pill px-5 py-1 text-sm rounded-full border border-white/20" data-genre="electronic">Electronic</button>
        <button onclick="filterBeats('pop')" class="genre-pill px-5 py-1 text-sm rounded-full border border-white/20" data-genre="pop">Pop</button>
        <button onclick="filterBeats('rnb')" class="genre-pill px-5 py-1 text-sm rounded-full border border-white/20" data-genre="rnb">R&amp;B</button>
      </div>

      <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4" id="beats-grid"></div>
    </div>

    <!-- TRACKS -->
    <div id="tracks-section" class="max-w-7xl mx-auto px-6 pt-14 pb-16">
      <div class="font-semibold text-2xl mb-6">Песни под ключ</div>
      <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-5" id="tracks-grid"></div>
    </div>
  </div>

  <!-- CTAs -->
  <div class="bg-[#111827] py-12 text-center border-t border-white/5">
    <div class="text-2xl font-semibold">Нужно что-то особенное?</div>
    <button onclick="showRequestModal('Индивидуальный бит или трек')" class="mt-5 px-12 py-3.5 bg-[#FACC15] text-[#0B0F1C] font-semibold rounded-2xl">Заказать индивидуальный продакшн</button>
  </div>

  <!-- Modals -->
  <div id="beat-modal" onclick="if (event.target.id === 'beat-modal') hideBeatModal()" class="hidden fixed inset-0 bg-black/90 z-[90] items-center justify-center p-4">
    <div onclick="event.stopImmediatePropagation()" class="modal bg-[#111827] w-full max-w-lg rounded-3xl p-8 border border-white/10"></div>
  </div>

  <div id="request-modal" onclick="if (event.target.id==='request-modal') hideRequestModal()" class="hidden fixed inset-0 bg-black/90 z-[100] flex items-center justify-center p-4">
    <div onclick="event.stopImmediatePropagation()" class="bg-[#111827] w-full max-w-md rounded-3xl p-7 border border-white/10">
      <div class="flex justify-between mb-6"><div class="font-semibold text-xl">Оставить заявку</div><button onclick="hideRequestModal()" class="text-2xl">×</button></div>
      <form id="req-form" onsubmit="submitWorkspaceRequest(event)">
        <input type="hidden" id="req-type">
        <div class="space-y-4">
          <input id="req-name" required placeholder="Имя" class="w-full bg-[#0B0F1C] border border-white/10 px-4 py-3 rounded-2xl">
          <div class="grid grid-cols-2 gap-4">
            <input id="req-phone" value="+7 " class="w-full bg-[#0B0F1C] border border-white/10 px-4 py-3 rounded-2xl">
            <input id="req-email" required type="email" placeholder="Email" class="w-full bg-[#0B0F1C] border border-white/10 px-4 py-3 rounded-2xl">
          </div>
          <textarea id="req-details" rows="3" placeholder="Жанр, BPM, референсы..." class="w-full bg-[#0B0F1C] border border-white/10 px-4 py-3 rounded-3xl"></textarea>
          <button class="w-full py-3.5 bg-[#FACC15] text-[#0B0F1C] rounded-2xl font-semibold">Отправить</button>
        </div>
      </form>
    </div>
  </div>

  <script>
    let beats = [
      {id:1,title:"Тёмный горизонт",genre:"trap",bpm:138,price:9900,exclusive:false,key:"C#m",image:"assets/images/covers/beat-cover-hiphop.jpg"},
      {id:2,title:"Северный ветер",genre:"hiphop",bpm:92,price:7900,exclusive:false,key:"F#m",image:"assets/images/covers/beat-cover-hiphop.jpg"},
      {id:3,title:"Neon Drift",genre:"electronic",bpm:128,price:11900,exclusive:true,key:"G",image:"assets/images/covers/beat-cover-electronic.jpg"},
      {id:4,title:"Москва 3:00",genre:"trap",bpm:145,price:6900,exclusive:false,key:"Dm",image:"assets/images/covers/beat-cover-hiphop.jpg"},
      {id:5,title:"Падаю вверх",genre:"pop",bpm:115,price:8900,exclusive:false,key:"A",image:"assets/images/covers/beat-cover-acoustic.jpg"},
      {id:6,title:"Тишина в голове",genre:"rnb",bpm:82,price:8500,exclusive:false,key:"Bm",image:"assets/images/covers/beat-cover-acoustic.jpg"},
      {id:7,title:"Грань",genre:"hiphop",bpm:87,price:7500,exclusive:false,key:"F",image:"assets/images/covers/beat-cover-hiphop.jpg"},
      {id:8,title:"Стеклянный лес",genre:"electronic",bpm:134,price:10500,exclusive:false,key:"E",image:"assets/images/covers/beat-cover-electronic.jpg"},
      {id:9,title:"Звёздная пыль",genre:"pop",bpm:102,price:12900,exclusive:true,key:"C",image:"assets/images/covers/beat-cover-acoustic.jpg"},
      {id:10,title:"Последний рассвет",genre:"trap",bpm:152,price:5900,exclusive:false,key:"Am",image:"assets/images/covers/beat-cover-hiphop.jpg"},
      {id:11,title:"Heartcode",genre:"rnb",bpm:78,price:9500,exclusive:false,key:"Gm",image:"assets/images/covers/beat-cover-acoustic.jpg"},
      {id:12,title:"Cold Static",genre:"electronic",bpm:140,price:9900,exclusive:false,key:"B",image:"assets/images/covers/beat-cover-electronic.jpg"},
      {id:13,title:"Дым над городом",genre:"hiphop",bpm:95,price:7200,exclusive:false,key:"Dm",image:"assets/images/covers/beat-cover-hiphop.jpg"},
      {id:14,title:"Pulse",genre:"electronic",bpm:125,price:8800,exclusive:false,key:"F",image:"assets/images/covers/beat-cover-electronic.jpg"},
      {id:15,title:"Ты и я",genre:"pop",bpm:108,price:9900,exclusive:false,key:"G",image:"assets/images/covers/beat-cover-acoustic.jpg"},
      {id:16,title:"Deep Blue",genre:"rnb",bpm:75,price:10500,exclusive:false,key:"Em",image:"assets/images/covers/beat-cover-acoustic.jpg"},
      {id:17,title:"Night Run",genre:"trap",bpm:150,price:6500,exclusive:false,key:"C#m",image:"assets/images/covers/beat-cover-hiphop.jpg"},
      {id:18,title:"Solar",genre:"electronic",bpm:132,price:11200,exclusive:false,key:"A",image:"assets/images/covers/beat-cover-electronic.jpg"},
    ];

    let readyTracks = [
      {id:1,title:"Светофор",artist:"Amin",genre:"Hip-Hop",price:24900,duration:"2:54",image:"assets/images/news/news-celebration.jpg"},
      {id:2,title:"Океан",artist:"LUNA",genre:"Indie Pop",price:39000,duration:"3:41",image:"assets/images/merch/vinyl.jpg"},
      {id:3,title:"Ветер в голове",artist:"Mayak Collective",genre:"Electronic",price:15900,duration:"4:02",image:"assets/images/covers/beat-cover-electronic.jpg"},
      {id:4,title:"Не отпускай",artist:"Nika Nova",genre:"Pop",price:18500,duration:"3:12",image:"assets/images/news/video-shoot.jpg"},
      {id:5,title:"Гроза",artist:"Amin",genre:"Trap",price:17900,duration:"2:48",image:"assets/images/covers/beat-cover-hiphop.jpg"},
      {id:6,title:"Тишина",artist:"LUNA",genre:"R&amp;B",price:22500,duration:"3:55",image:"assets/images/artists/vocal-session.jpg"},
      {id:7,title:"Холодный свет",artist:"Mayak Beats",genre:"Electronic",price:14500,duration:"4:20",image:"assets/images/covers/beat-cover-electronic.jpg"},
      {id:8,title:"Последний",artist:"Nika Nova",genre:"Pop",price:19900,duration:"3:30",image:"assets/images/studios/large/concert.jpg"},
    ];

    function renderBeats(list) {
      const grid = document.getElementById('beats-grid');
      grid.innerHTML = '';
      list.forEach(b => {
        const el = document.createElement('div');
        el.className = `beat-card bg-[#111827] border border-white/10 rounded-3xl overflow-hidden`;
        el.innerHTML = `
          <div class="relative">
            <img src="${b.image}" class="w-full aspect-square object-cover">
            ${b.exclusive ? `<div class="absolute top-3 right-3 text-[10px] px-2 py-px bg-red-600/90 rounded font-medium">EXCLUSIVE</div>` : ''}
            <button onclick="playPreview(${b.id}, this); event.stopImmediatePropagation()" class="absolute bottom-3 right-3 bg-[#0B0F1C]/80 hover:bg-[#FACC15] hover:text-[#0B0F1C] w-9 h-9 flex items-center justify-center rounded-full">
              <i class="fa-solid fa-play ml-0.5"></i>
            </button>
          </div>
          <div class="p-4">
            <div class="flex justify-between">
              <div>
                <div class="font-semibold">${b.title}</div>
                <div class="text-xs text-white/50">${b.key} • ${b.bpm} BPM</div>
              </div>
              <div class="font-semibold tabular-nums text-right">${b.price.toLocaleString('ru')} ₽</div>
            </div>
            <div class="flex gap-2 mt-4">
              <button onclick="buyBeat(${b.id}); event.stopImmediatePropagation()" class="flex-1 bg-white text-[#0B0F1C] py-2 text-sm font-medium rounded-2xl">Купить</button>
              <button onclick="showBeatModal(${b.id}); event.stopImmediatePropagation()" class="flex-1 border border-white/20 py-2 text-sm rounded-2xl">Подробнее</button>
            </div>
          </div>`;
        el.onclick = () => showBeatModal(b.id);
        grid.appendChild(el);
      });
    }

    function renderTracks() {
      const grid = document.getElementById('tracks-grid');
      grid.innerHTML = '';
      readyTracks.forEach(t => {
        const el = document.createElement('div');
        el.className = `beat-card bg-[#111827] border border-white/10 rounded-3xl overflow-hidden`;
        el.innerHTML = `
          <img src="${t.image}" class="w-full h-52 object-cover">
          <div class="p-4">
            <div class="flex justify-between">
              <div><div class="font-semibold">${t.title}</div><div class="text-sm text-white/60">${t.artist}</div></div>
              <div class="text-right text-sm"><div>${t.genre}</div><div class="font-semibold">${t.price.toLocaleString('ru')} ₽</div></div>
            </div>
            <div class="mt-4 flex gap-2">
              <button onclick="buyTrack(${t.id}, event)" class="flex-1 bg-white text-[#0B0F1C] py-2 text-sm font-medium rounded-2xl">Купить</button>
              <button onclick="showTrackModal(${t.id}, event)" class="flex-1 border border-white/20 rounded-2xl py-2 text-sm">Послушать</button>
            </div>
          </div>`;
        grid.appendChild(el);
      });
    }

    function filterBeats(g) {
      document.querySelectorAll('#genre-filters button').forEach(b => b.classList.remove('active'));
      const active = document.querySelector(`#genre-filters button[data-genre="${g}"]`) || document.querySelector('#genre-filters button');
      active.classList.add('active');

      const filtered = g === 'all' ? beats : beats.filter(x => x.genre === g);
      renderBeats(filtered);
    }

    let currentOsc = null;
    function playPreview(id, btn) {
      event.stopImmediatePropagation();
      if (currentOsc) {
        try { currentOsc.stop(); } catch(e){}
        currentOsc = null;
      }

      const b = beats.find(x => x.id === id);
      btn.innerHTML = '<i class="fa-solid fa-pause"></i>';

      const ctx = new (window.AudioContext || window.webkitAudioContext)();
      const osc = ctx.createOscillator();
      const g = ctx.createGain();
      const f = ctx.createBiquadFilter();

      osc.type = 'sawtooth';
      osc.frequency.value = 55 + (b.bpm - 90) * 1.2;
      f.type = 'lowpass';
      f.frequency.value = 1100;
      g.gain.value = 0.06;

      osc.connect(f).connect(g).connect(ctx.destination);
      osc.start();

      currentOsc = osc;

      setTimeout(() => {
        try { osc.stop(); } catch(e){}
        btn.innerHTML = '<i class="fa-solid fa-play ml-0.5"></i>';
        currentOsc = null;
      }, 8200);
    }

    function showBeatModal(id) {
      const b = beats.find(x => x.id === id);
      const modal = document.getElementById('beat-modal');
      modal.querySelector('.modal').innerHTML = `
        <div>
          <img src="${b.image}" class="w-full rounded-2xl aspect-video mb-5 object-cover">
          <div class="flex justify-between items-start">
            <div>
              <div class="text-xs text-[#3B82F6]">${b.genre.toUpperCase()} • ${b.bpm} BPM</div>
              <div class="text-2xl font-semibold">${b.title}</div>
              <div class="text-white/60">${b.key}</div>
            </div>
            <div class="text-right">
              <div class="text-xs text-white/50">ЦЕНА</div>
              <div class="font-semibold text-2xl">${b.price.toLocaleString('ru')} ₽</div>
            </div>
          </div>

          <div class="flex gap-3 mt-7">
            <button onclick="buyBeat(${b.id}); hideBeatModal()" class="flex-1 bg-[#FACC15] py-3 text-[#0B0F1C] font-semibold rounded-2xl">Купить бит</button>
            <button onclick="buyBeat(${b.id}, true); hideBeatModal()" class="flex-1 border border-white/30 rounded-2xl">Эксклюзив</button>
          </div>
          <button onclick="hideBeatModal(); showRequestModal('Кастомизация бита')" class="w-full mt-3 py-3 text-sm border border-white/20 rounded-2xl">Заказать доработку</button>
        </div>`;
      modal.classList.remove('hidden');
      modal.classList.add('flex');
    }
    function hideBeatModal() {
      document.getElementById('beat-modal').classList.remove('flex');
      document.getElementById('beat-modal').classList.add('hidden');
    }

    function buyBeat(id, ex = false) {
      const b = beats.find(x => x.id === id);
      let p = ex ? Math.round(b.price * 1.4) : b.price;
      hideBeatModal();
      showToast(`Бит «${b.title}» добавлен. ${p.toLocaleString('ru')} ₽`);
    }
    function buyTrack(id, ev) {
      ev.stopImmediatePropagation();
      const t = readyTracks.find(x => x.id === id);
      showToast(`Трек «${t.title}» добавлен. ${t.price.toLocaleString('ru')} ₽`);
    }
    function showTrackModal(id, ev) {
      ev.stopImmediatePropagation();
      const t = readyTracks.find(x => x.id === id);
      const modal = document.getElementById('beat-modal');
      modal.querySelector('.modal').innerHTML = `
        <div>
          <img src="${t.image}" class="w-full rounded-2xl mb-5">
          <div class="font-semibold text-2xl">${t.title}</div>
          <div class="text-white/70">${t.artist} • ${t.genre}</div>
          <div class="text-4xl font-semibold mt-3">${t.price.toLocaleString('ru')} ₽</div>
          <div class="flex gap-3 mt-6">
            <button onclick="buyTrack(${t.id}, {stopImmediatePropagation:()=>{} }); hideBeatModal()" class="flex-1 py-3 bg-[#FACC15] text-[#0B0F1C] font-semibold rounded-2xl">Купить песню</button>
            <button onclick="hideBeatModal(); showRequestModal()" class="flex-1 border border-white/30 py-3 rounded-2xl">Запросить права</button>
          </div>
        </div>`;
      modal.classList.remove('hidden'); modal.classList.add('flex');
    }

    function showRequestModal(t = '') {
      const m = document.getElementById('request-modal');
      m.classList.remove('hidden');
      m.classList.add('flex');
      document.getElementById('req-type').value = t;
    }
    function hideRequestModal() {
      document.getElementById('request-modal').classList.add('hidden');
      document.getElementById('request-modal').classList.remove('flex');
    }
    function submitWorkspaceRequest(e) {
      e.preventDefault();
      hideRequestModal();
      showToast('Заявка отправлена! Мы ответим в течение часа.');
    }
    function showToast(msg) {
      const t = document.createElement('div');
      t.className = 'fixed bottom-5 left-1/2 -translate-x-1/2 bg-white text-[#0B0F1C] px-7 py-3 rounded-3xl text-sm font-medium z-50';
      t.textContent = msg;
      document.body.appendChild(t);
      setTimeout(() => t.remove(), 3400);
    }

    function init() {
      renderBeats(beats);
      renderTracks();
    }
    window.onload = init;
  </script>
</body>
</html>
